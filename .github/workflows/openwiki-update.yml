name: OpenWiki Update

on:
  schedule:
    - cron: "0 8 * * *" # daily 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-wiki:
    name: Regenerate OpenWiki
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write # create-pull-request commits the openwiki/update branch
      pull-requests: write # ...and opens/updates the review PR
    env:
      OPENWIKI_PROVIDER: anthropic
      OPENWIKI_MODEL_ID: ${{ vars.OPENWIKI_MODEL_ID || 'claude-haiku-4-5' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install OpenWiki CLI
        run: npm install -g openwiki

      - name: Regenerate wiki
        run: openwiki code --update --print

      - name: Stamp generation provenance
        # Written after regeneration so it survives OpenWiki rewriting its own
        # pages. This is a CI-written provenance marker, not a human hand-edit.
        run: |
          mkdir -p openwiki
          {
            echo "# OpenWiki — generation provenance"
            echo
            echo "> Generated by \`.github/workflows/openwiki-update.yml\`. Do not hand-edit."
            echo "> The wiki can lag \`main\` by up to a day under CI-primary regeneration"
            echo "> (ADR-0011); when the wiki and code disagree, the code is the source of truth."
            echo
            echo "- Last regenerated (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Source commit: ${GITHUB_SHA}"
            echo "- Provider / model: ${OPENWIKI_PROVIDER} / ${OPENWIKI_MODEL_ID}"
          } > openwiki/GENERATED.md

      - name: Open or update docs PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Commit only the generated wiki. `openwiki code --update` can also
          # touch files outside openwiki/ (e.g. .github/workflows/, CLAUDE.md);
          # staging a workflow file would make the push fail — the default
          # GITHUB_TOKEN cannot create/update `.github/workflows/**` (there is
          # no `workflows` permission scope to grant it), and per ADR-0011 the
          # generated output is the openwiki/ folder, nothing else.
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki regeneration (Anthropic provider).

            Generated output — review the rendered docs, do not hand-edit `openwiki/`.
            See ADR-0011 and #20.
          labels: documentation
          delete-branch: false
